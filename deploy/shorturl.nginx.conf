## shorturl.janapriyahomes.com -> uvicorn 127.0.0.1:8401
##
## Live copy at /etc/nginx/conf.d/shorturl.conf. Deploy =
##   sudo cp deploy/shorturl.nginx.conf /etc/nginx/conf.d/shorturl.conf
##   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name shorturl.janapriyahomes.com;

    client_max_body_size 1M;

    # Robots: only the admin/login surface is sensitive; redirects need to be crawlable
    # if you ever post short links publicly. Admin is noindex via meta tag in templates.

    location / {
        proxy_pass http://127.0.0.1:8401;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    listen 443 ssl; # managed by Certbot
    http2 on;
    ssl_certificate /etc/letsencrypt/live/shorturl.janapriyahomes.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shorturl.janapriyahomes.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = shorturl.janapriyahomes.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name shorturl.janapriyahomes.com;
    return 404; # managed by Certbot


}
